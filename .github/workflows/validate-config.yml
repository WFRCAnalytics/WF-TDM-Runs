name: Validate config

# Validates run_set/scenario config on every PR. Does not check out the TDM
# submodule's full history or run any model -- just enough of the submodule
# to read the Scenarios/_default/ baseline files referenced by run_set.yaml.
on:
  pull_request:
    paths:
      - "run_sets/**"
      - "config/**"
      - "src/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # NOTE: the TDM submodule is a separate, likely private repository.
          # Checking it out in CI requires either a deploy key or a PAT with
          # read access, configured as a repo secret and passed here as
          # `token:`. See docs/architecture/ for details.
          submodules: recursive

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - run: uv run tdmruns validate-config

      - name: Enforce repo-wide file size ceiling
        run: uv run python scripts/check_file_sizes.py
