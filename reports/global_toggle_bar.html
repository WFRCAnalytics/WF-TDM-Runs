<div id="wfrc-global-toggle-bar" class="wfrc-global-toggle-bar">
  <div class="wfrc-global-toggle-row">
    <span class="wfrc-global-toggle-label">Shift level</span>
    <button type="button" data-axis="shift" data-value="5%">5%</button>
    <button type="button" data-axis="shift" data-value="10%">10%</button>
    <button type="button" data-axis="shift" data-value="25%">25%</button>
  </div>
  <div class="wfrc-global-toggle-row">
    <span class="wfrc-global-toggle-label">Period</span>
    <button type="button" data-axis="period" data-value="Peak">Peak</button>
    <button type="button" data-axis="period" data-value="Off-Peak">Off-Peak</button>
    <button type="button" data-axis="period" data-value="Daily">Daily</button>
  </div>
  <div class="wfrc-global-toggle-row">
    <span class="wfrc-global-toggle-label">Value</span>
    <button type="button" data-pct="Absolute">Change</button>
    <button type="button" data-pct="% Change">% Change</button>
  </div>
</div>
<style>
.wfrc-global-toggle-bar {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 1000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 13px;
  background: rgba(255, 255, 255, 0.9);
  padding: 6px 8px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
}
.wfrc-global-toggle-row {
  display: flex;
  align-items: center;
  white-space: nowrap;
}
.wfrc-global-toggle-row + .wfrc-global-toggle-row {
  margin-top: 4px;
}
.wfrc-global-toggle-label {
  color: #1B3A5C;
  margin-right: 6px;
  font-weight: 600;
  min-width: 68px;
}
.wfrc-global-toggle-bar button {
  font-family: inherit;
  font-size: inherit;
  border: 1px solid #1B3A5C;
  border-radius: 4px;
  padding: 3px 10px;
  margin-left: 4px;
  cursor: pointer;
  background: #E8F4F8;
  color: #1B3A5C;
}
.wfrc-global-toggle-bar button.wfrc-active {
  background: #1B3A5C;
  color: #FFFFFF;
}
</style>
<script>
(function () {
  // Deck-wide shift-level and period controls -- one shared set instead of
  // every chart carrying its own buttons for these two dimensions. Each
  // chart built with figure_with_shift_toggle(..., global_shift=True) and/
  // or global_period=True (see chart_utils.py) skips building local
  // buttons for whichever of these dimensions it globalized and instead
  // records, in layout.meta:
  //   - wfrcGlobalAxes: {"shift": [...labels], "period": [...labels]} --
  //     which of the two axes THIS chart globalized, and in what order
  //     (a chart missing "period" here never had a period_col at all, or
  //     kept it local -- either way this bar leaves it alone).
  //   - wfrcGlobalLevels: {"<composite key>": {visible, relayout}} -- one
  //     entry per combination of the chart's own globalized axes, where
  //     the composite key joins each axis's label with "|" in
  //     wfrcGlobalAxes' own key order (e.g. "10%|Peak" for a chart with
  //     both axes globalized, or just "10%" for one with only shift
  //     globalized). This exists (rather than one meta list per axis) so
  //     ONE shared state object can track shift AND period at once
  //     without clicking one silently resetting the other back to some
  //     assumed default -- the gap a single-axis-only version of this had.
  //
  // A third, independent control ("Value": Change / % Change) drives
  // figure_with_shift_toggle(..., global_pct=True)'s wfrcPctLevels meta --
  // {"Absolute": {y, relayout}, "% Change": {y, relayout}} (plus an "x"
  // key too, for a chart that also swaps x on this toggle -- pct_x_col,
  // e.g. a scatter comparing two metrics), keyed directly on the label
  // rather than a composite key, because the Absolute/%
  // Change row is y-swap-based (not visibility-based) and was already
  // fully independent of shift/period/group in the per-chart version of
  // this toggle (see chart_utils.py's figure_with_shift_toggle docstring)
  // -- so it doesn't need to participate in wfrcGlobalLevels' composite-key
  // scheme at all, just its own separate Plotly.update call.
  //
  // This bar keeps one page-level `state` object (current shift, current
  // period, current value mode) and, on every click, recomputes each
  // chart's own composite key from whichever axes THAT chart actually
  // declared, so a chart tracking only one axis isn't affected by the
  // other, and applies the value-mode entry (if the chart has one)
  // independently of both.
  var state = { shift: "10%", period: "Peak", pct: "Absolute" };

  function applyToChart(div) {
    var meta = div.layout && div.layout.meta;

    var axes = meta && meta.wfrcGlobalAxes;
    var levels = meta && meta.wfrcGlobalLevels;
    if (axes && levels) {
      var axisNames = Object.keys(axes);
      if (axisNames.length > 0) {
        var key = axisNames.map(function (a) { return state[a]; }).join("|");
        var entry = levels[key];
        if (entry) Plotly.update(div, { visible: entry.visible }, entry.relayout || {});
      }
    }

    var pctLevels = meta && meta.wfrcPctLevels;
    if (pctLevels) {
      var pctEntry = pctLevels[state.pct];
      if (pctEntry) {
        // x is only present for a chart that ALSO swaps its x-axis on this
        // toggle (figure_with_shift_toggle's pct_x_col, e.g. a scatter
        // comparing two metrics) -- every other chart's entry has no "x"
        // key, so this stays a y-only restyle exactly as before.
        var traceUpdate = { y: pctEntry.y };
        if (pctEntry.x) traceUpdate.x = pctEntry.x;
        Plotly.update(div, traceUpdate, pctEntry.relayout || {});
      }
    }
  }

  function applyAll() {
    document.querySelectorAll(".js-plotly-plot").forEach(applyToChart);
  }

  function updateButtonHighlight(axis) {
    document.querySelectorAll('#wfrc-global-toggle-bar button[data-axis="' + axis + '"]').forEach(function (btn) {
      btn.classList.toggle("wfrc-active", btn.dataset.value === state[axis]);
    });
  }

  function updatePctHighlight() {
    document.querySelectorAll('#wfrc-global-toggle-bar button[data-pct]').forEach(function (btn) {
      btn.classList.toggle("wfrc-active", btn.dataset.pct === state.pct);
    });
  }

  document.querySelectorAll("#wfrc-global-toggle-bar button[data-axis]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var axis = btn.dataset.axis;
      state[axis] = btn.dataset.value;
      updateButtonHighlight(axis);
      applyAll();
    });
  });

  document.querySelectorAll("#wfrc-global-toggle-bar button[data-pct]").forEach(function (btn) {
    btn.addEventListener("click", function () {
      state.pct = btn.dataset.pct;
      updatePctHighlight();
      applyAll();
    });
  });

  // Default selection on load matches every chart's own default_shift/
  // default_period/Absolute-mode default (10%, Peak, Absolute --
  // PRIMARY_SHIFT_PCT / "Peak" in slides.qmd, and figure_with_shift_toggle's
  // own Absolute-first pct ordering) -- just highlights the buttons to
  // match what's already visible, no Plotly.update needed since every
  // chart already renders that way by default.
  updateButtonHighlight("shift");
  updateButtonHighlight("period");
  updatePctHighlight();
})();
</script>
