<div id="wfrc-global-shift-bar" class="wfrc-global-shift-bar">
  <span class="wfrc-global-shift-label">Shift level</span>
  <button type="button" data-shift-label="5%">5%</button>
  <button type="button" data-shift-label="10%">10%</button>
  <button type="button" data-shift-label="25%">25%</button>
</div>
<style>
.wfrc-global-shift-bar {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 1000;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 13px;
  background: rgba(255, 255, 255, 0.9);
  padding: 6px 8px;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
}
.wfrc-global-shift-label {
  color: #1B3A5C;
  margin-right: 6px;
  font-weight: 600;
}
.wfrc-global-shift-bar button {
  font-family: inherit;
  font-size: inherit;
  border: 1px solid #1B3A5C;
  border-radius: 4px;
  padding: 3px 10px;
  margin-left: 4px;
  cursor: pointer;
  background: #E8F4F8;
  color: #1B3A5C;
}
.wfrc-global-shift-bar button.wfrc-active {
  background: #1B3A5C;
  color: #FFFFFF;
}
</style>
<script>
(function () {
  // Deck-wide shift-level control -- one control instead of every chart
  // carrying its own 5%/10%/25% buttons. Each chart built with
  // figure_with_shift_toggle(..., global_shift=True) (see chart_utils.py)
  // skips building its own shift-level buttons and instead stores what
  // they would have done in layout.meta.wfrcShiftLevels: for each shift
  // level, the trace-visibility array plus a relayout dict that resets any
  // OTHER toggle row (period/group) on that chart back to its own
  // default. Clicking a button here just replays that same precomputed
  // data against every chart in the document via Plotly.update -- nothing
  // here recomputes visibility itself, so it can't drift from what each
  // chart's own Python-side toggle logic already decided.
  //
  // Queries the whole document, not just the current slide (RevealJS
  // keeps every slide's content in the DOM at once) -- so a shift-level
  // choice, once made, applies deck-wide and holds as you navigate,
  // matching this being a single persistent control rather than a
  // per-slide one.
  function applyGlobalShift(label) {
    document.querySelectorAll(".js-plotly-plot").forEach(function (div) {
      var meta = div.layout && div.layout.meta;
      var levels = meta && meta.wfrcShiftLevels;
      if (!levels) return;
      var entry = levels.find(function (e) { return e.label === label; });
      if (!entry) return;
      Plotly.update(div, { visible: entry.visible }, entry.relayout || {});
    });
    document.querySelectorAll("#wfrc-global-shift-bar button").forEach(function (btn) {
      btn.classList.toggle("wfrc-active", btn.dataset.shiftLabel === label);
    });
  }

  document.querySelectorAll("#wfrc-global-shift-bar button").forEach(function (btn) {
    btn.addEventListener("click", function () {
      applyGlobalShift(btn.dataset.shiftLabel);
    });
  });

  // Default selection on load matches every chart's own default_shift
  // (10%, see PRIMARY_SHIFT_PCT in slides.qmd) -- just highlights the
  // button to match what's already visible, no Plotly.update needed since
  // every chart already renders with 10% visible by default.
  var defaultBtn = document.querySelector('#wfrc-global-shift-bar button[data-shift-label="10%"]');
  if (defaultBtn) defaultBtn.classList.add("wfrc-active");
})();
</script>
