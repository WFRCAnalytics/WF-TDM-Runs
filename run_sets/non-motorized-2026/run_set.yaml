#========================================================================================
# run_sets/non-motorized-2026/run_set.yaml
#========================================================================================
run_set_id: non-motorized-2026
description: >
  Non-motorized network sensitivity test — 13 scenarios varying HH and EMP
  at different multipliers and spatial scopes (specific TAZs, small districts,
  or region-wide) to quantify mode-choice response to localized land-use changes.
  Replicates the 14-scenario study that previously took over a month manually.

tdm_ref: "v1000-E3"
baseline_control_center: "1ControlCenter - BY_2019.block"

overrides:
  Run_Documentation: 0
  vizToolDir: "run_sets/non-motorized-2026/.vizTool"

outputs:
  include:
    - "reports/*.csv"
    - "logs/RunModel.log"
  max_file_size_mb: 25
