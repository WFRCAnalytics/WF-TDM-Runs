#========================================================================================
# run_sets/bring-work-trips-closer-to-home/run_set.yaml
#========================================================================================
run_set_id: bring-work-trips-closer-to-home
author: "Bill Hereth"
description: >
  Sketch-level test of localized HBW trip redistribution. For each of three geography types (City Area ~55, Medium District ~35, Workshop Area 8), 10% of home-based work trips currently ending outside the target geography are proportionally redistributed to destinations inside that geography (redistributed proportional to existing internal trip pattern), applied before mode choice. Three scenarios total, one per geography type, each applied region-wide (all areas of that type adjusted simultaneously). Base year 2023, model v10.0.0-beta.1 (updated household/transit on-board survey data). Outputs: VMT, VHD, traffic volume, and transit/corridor effects vs. base.

tdm_ref: "v10.0.0-beta.1-closer-to-home"
baseline_control_center: "_ControlCenter - BY_2023.block"

# prep_script:   # optional: path to a Python script relative to this run_set dir
                 # run once per scenario before model execution
                 # script receives --run-set-dir and --scenario-id as arguments

overrides:
  Run_Documentation: 0

outputs:
  include:
    - "4_ModeChoice/2_DetailedTripMatrices/*ZoneSummary_TripsByMode.csv"
    - "4_ModeChoice/4_Shares/*RegionShares_Daily.csv"
    - "4_ModeChoice/4_Shares/*RegionShares_Ok.csv"
    - "4_ModeChoice/4_Shares/*RegionShares_Pk.csv"
    - "5_AssignHwy/4_Summaries/*Summary_SEGID.csv"
    - pattern: "5_AssignHwy/4_Summaries/*TAZ-Based Metrics.csv"
      # full file runs ~200 MB across ~18 columns; these 6 are what reports
      # actually read, comfortably under max_file_size_mb once filtered
      columns: [TAZID, Metric, Purpose, Period, PA, Total]
  max_file_size_mb: 95

report_snapshot_script: report_snapshot.py
